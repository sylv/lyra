[package]
name = "lyra"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8", features = ["macros"] }
anyhow = "1.0"
serde = "1.0"
serde_json = "1.0.140"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6.6", features = ["cors", "fs"] }
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
reqwest = { version = "0.12", features = ["stream", "json"] }
once_cell = "1.21.3"
async-graphql = { version = "7.0.14", features = ["dataloader"] }
async-graphql-axum = "7.0.14"
tokio-util = "0.7.15"
futures-util = "0.3.31"
rand = "0.9.1"
tempfile = "3.20.0"
regex = "1.11.1"
lazy_static = "1.5.0"
glob = "0.3.3"
sha2 = "0.10.9"

[features]
static = []
