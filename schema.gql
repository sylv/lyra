type ActiveTask {
	taskType: String!
	title: String!
	current: Int!
	total: Int!
	progressPercent: Float!
}

type File {
	id: Int!
	libraryId: Int!
	relativePath: String!
	sizeBytes: Int!
	height: Int
	width: Int
	editionName: String
	unavailableAt: Int
	corruptedAt: Int
	scannedAt: Int
	discoveredAt: Int!
}

type Library {
	id: Int!
	name: String!
	path: String!
	lastScannedAt: Int
	createdAt: Int!
}

type Mutation {
	signup(username: String!, password: String!, permissions: Int, inviteCode: String): User!
	updateWatchProgress(nodeId: String!, progressPercent: Float!, userId: String): WatchProgress!
	createLibrary(name: String!, path: String!): Library!
}

type Node {
	id: String!
	rootId: String
	parentId: String
	libraryId: Int!
	fileId: Int
	relativePath: String!
	name: String!
	kind: NodeKind!
	properties: NodeProperties!
	firstLinkedAt: Int
	"""
	Gets the default file connection for this node, including child connections.
	"""
	defaultConnection: File
	seasons: [Int!]!
	parent: Node
	watchProgress: WatchProgress
}

type NodeConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [NodeEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Node!]!
}

"""
An edge in a connection.
"""
type NodeEdge {
	"""
	The item at the end of the edge
	"""
	node: Node!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

input NodeFilter {
	parentId: String
	seasonNumbers: [Int!]
	kinds: [NodeKind!]
	search: String
	orderBy: NodeOrderBy
	orderDirection: OrderDirection
	watched: Boolean
}

enum NodeKind {
	MOVIE
	SERIES
	SEASON
	EPISODE
}

enum NodeOrderBy {
	ADDED_AT
	RELEASED_AT
	ALPHABETICAL
	RATING
	SEASON_EPISODE
}

type NodeProperties {
	description: String
	rating: Float
	backgroundUrl: String
	seasonNumber: Int
	episodeNumber: Int
	runtimeMinutes: Int
	releasedAt: Int
	endedAt: Int
	createdAt: Int
	updatedAt: Int
	posterUrl: String
	thumbnailUrl: String
}

enum OrderDirection {
	ASC
	DESC
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type Query {
	nodeList(filter: NodeFilter!, after: String, first: Int): NodeConnection!
	node(nodeId: String!): Node!
	"""
	Used during library setup to pick the library path
	"""
	listFiles(path: String!): [String!]!
	libraries: [Library!]!
	activeTasks: [ActiveTask!]!
}

type User {
	id: String!
	username: String!
	permissions: Int!
	defaultSubtitleIso6391: String
	defaultAudioIso6391: String
	subtitlesEnabled: Boolean!
	createdAt: Int!
}

type WatchProgress {
	id: Int!
	userId: String!
	fileId: Int
	nodeId: String
	progressPercent: Float!
	createdAt: Int!
	updatedAt: Int!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
}
