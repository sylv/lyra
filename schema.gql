type File {
	id: Int!
	libraryId: Int!
	relativePath: String!
	pendingAutoMatch: Int!
	editionName: String
	resolution: Int
	sizeBytes: Int
	scannedAt: Int!
	unavailableAt: Int
	corruptedAt: Int
}

type Library {
	id: Int!
	name: String!
	path: String!
	lastScannedAt: Int
}

type Media {
	id: Int!
	imdbId: String
	tmdbId: Int
	parentId: Int
	kind: MediaKind!
	name: String!
	description: String
	rating: Float
	posterUrl: String
	backgroundUrl: String
	thumbnailUrl: String
	seasonNumber: Int
	episodeNumber: Int
	runtimeMinutes: Int
	releasedAt: Int
	endedAt: Int
	createdAt: Int!
	updatedAt: Int
	firstLinkedAt: Int
	"""
	Gets the default file connection for this media item, including child connections.
	(this is what should be played if the user hits "play" on this media item)
	"""
	defaultConnection: File
	seasons: [Int!]!
	parent: Media
	watchState: WatchState
}

type MediaConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [MediaEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Media!]!
}

"""
An edge in a connection.
"""
type MediaEdge {
	"""
	The item at the end of the edge
	"""
	node: Media!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

input MediaFilter {
	parentId: Int
	seasonNumbers: [Int!]
	kinds: [MediaKind!]
	search: String
	orderBy: MediaOrderBy
	orderDirection: OrderDirection
	watched: Boolean
}

enum MediaKind {
	MOVIE
	SHOW
	EPISODE
}

enum MediaOrderBy {
	ADDED_AT
	RELEASED_AT
	ALPHABETICAL
	RATING
	SEASON_EPISODE
}

type Mutation {
	signup(username: String!, password: String!, permissions: Int, inviteCode: String): User!
	updateWatchState(mediaId: Int!, progressPercentage: Float!, userId: String): WatchState!
	createLibrary(name: String!, path: String!): Library!
}

enum OrderDirection {
	ASC
	DESC
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type Query {
	mediaList(filter: MediaFilter!, after: String, first: Int): MediaConnection!
	media(mediaId: Int!): Media!
	"""
	Used during library setup to pick the library path
	"""
	listFiles(path: String!): [String!]!
	libraries: [Library!]!
}

type User {
	id: String!
	username: String!
	permissions: Int!
	defaultSubtitleiso639_1: String
	defaultAudioiso639_1: String
	subtitlesEnabled: Boolean!
	createdAt: Int!
}

type WatchState {
	id: Int!
	userId: String!
	mediaId: Int!
	progressPercentage: Float!
	createdAt: Int!
	updatedAt: Int!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
}
