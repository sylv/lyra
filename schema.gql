type Activity {
	taskType: String!
	title: String!
	current: Int
	total: Int
	progressPercent: Float
}

type Asset {
	id: String!
	sourceUrl: String
	hashSha256: String
	sizeBytes: Int
	uncompressedSizeBytes: Int
	mimeType: String
	contentEncoding: String
	height: Int
	width: Int
	thumbhash: String
	createdAt: Int!
	signedUrl: String!
	aspectRatio: String
}

type AudioRenditionOption {
	renditionId: String!
	codecName: String!
	bitrate: Int
	channels: Int
	sampleRate: Int
	codecTag: String!
	onDemand: Boolean!
}

type AudioTrackOption {
	streamIndex: Int!
	displayName: String!
	language: String
	recommended: Boolean!
	renditions: [AudioRenditionOption!]!
}

type CastMember {
	characterName: String
	department: String
	person: Person!
}

type Collection {
	id: String!
	name: String!
	description: String
	createdById: String
	visibility: CollectionVisibility!
	resolverKind: CollectionResolverKind!
	showOnHome: Boolean!
	homePosition: Int!
	pinned: Boolean!
	pinnedPosition: Int!
	createdAt: Int!
	updatedAt: Int!
	kind: CollectionKind
	createdBy: User
	canEdit: Boolean!
	canDelete: Boolean!
	itemCount: Int!
	nodeList(after: String, first: Int): NodeConnection!
}

enum CollectionKind {
	CONTINUE_WATCHING
	RECENTLY_RELEASED
	RECENTLY_ADDED
}

enum CollectionResolverKind {
	MANUAL
	FILTER
}

enum CollectionVisibility {
	PUBLIC
	PRIVATE
}

type ContentRating {
	countryCode: String!
	rating: String!
}

enum ContentUpdateEvent {
	CONTENT_UPDATE
}

input DisabledSubtitlesHintInput {
	fileId: String!
	trackId: String!
	renditionId: String!
}

enum EffectiveWatchSessionState {
	PLAYING
	PAUSED
	BUFFERING
	INACTIVE_PLAYERS
}

type File {
	id: String!
	libraryId: String!
	relativePath: String!
	sizeBytes: Int!
	height: Int
	width: Int
	editionName: String
	subtitlesExtractedAt: Int
	unavailableAt: Int
	scannedAt: Int
	discoveredAt: Int!
	probe: FileProbe
	playbackOptions(languageHints: [String!]): PlaybackOptions!
	timelinePreview: [TimelinePreviewSheet!]!
	subtitles(languageHints: [String!]): [SubtitleTrack!]!
	segments: [FileSegment!]!
}

type FileProbe {
	runtimeMinutes: Int
	durationSeconds: Int
	width: Int
	height: Int
	videoCodec: String
	audioCodec: String
	fps: Float
	videoBitrate: Int
	audioBitrate: Int
	audioChannels: Int
	hasSubtitles: Boolean!
}

type FileSegment {
	kind: FileSegmentKind!
	startMs: Int!
	endMs: Int!
}

enum FileSegmentKind {
	INTRO
}

type HomeView {
	sections: [Collection!]!
}

type ImportWatchStateConflict {
	rowIndex: Int!
	sourceItemId: String
	title: String
	itemId: String!
	existingProgressPercent: Float!
	importedProgressPercent: Float!
	reason: String!
}

input ImportWatchStateRowInput {
	source: String!
	sourceItemId: String
	title: String
	mediaType: String
	seasonNumber: Int
	episodeNumber: Int
	progressPercent: Float!
	viewedAt: Int
	filePath: String
	fileBasename: String
	fileSizeBytes: Int
	imdbId: String
	tmdbId: Int
}

type ImportWatchStateUnmatched {
	rowIndex: Int!
	sourceItemId: String
	title: String
	reason: String!
	ambiguous: Boolean!
}

input ImportWatchStatesInput {
	dryRun: Boolean!
	overwriteConflicts: Boolean!
	rows: [ImportWatchStateRowInput!]!
}

type ImportWatchStatesResult {
	dryRun: Boolean!
	totalRows: Int!
	matchedRows: Int!
	unmatchedRows: Int!
	conflictRows: Int!
	willInsert: Int!
	willOverwrite: Int!
	imported: Int!
	skipped: Int!
	conflicts: [ImportWatchStateConflict!]!
	unmatched: [ImportWatchStateUnmatched!]!
}

type Library {
	id: String!
	name: String!
	path: String!
	pinned: Boolean!
	lastScannedAt: Int
	unavailableAt: Int
	createdAt: Int!
}

type MetadataGenre {
	providerId: String!
	externalId: String
	name: String!
}

enum MetadataStatus {
	UPCOMING
	AIRING
	RETURNING
	FINISHED
	CANCELLED
	IN_THEATERS
	RELEASED
}

type Mutation {
	signup(username: String!, password: String!, permissions: Int, inviteCode: String): User!
	createUserInvite(username: String!, permissions: Int!, libraryIds: [String!]!): User!
	updateUser(userId: String!, username: String!, permissions: Int!, libraryIds: [String!]!): User!
	resetUserInvite(userId: String!): User!
	deleteUser(userId: String!): Boolean!
	updateWatchProgress(fileId: String!, progressPercent: Float!, userId: String): [WatchProgress!]!
	importWatchStates(input: ImportWatchStatesInput!): ImportWatchStatesResult!
	createLibrary(name: String!, path: String!, pinned: Boolean): Library!
	updateLibrary(libraryId: String!, name: String!, path: String!, pinned: Boolean!): Library!
	createCollection(name: String!, description: String, visibility: CollectionVisibility!, resolverKind: CollectionResolverKind!, filter: NodeFilter, showOnHome: Boolean, homePosition: Int, pinned: Boolean, pinnedPosition: Int): Collection!
	updateCollection(collectionId: String!, name: String!, description: String, visibility: CollectionVisibility!, resolverKind: CollectionResolverKind!, filter: NodeFilter, showOnHome: Boolean!, homePosition: Int!, pinned: Boolean!, pinnedPosition: Int!): Collection!
	deleteCollection(collectionId: String!): Boolean!
	addNodeToCollection(collectionId: String!, nodeId: String!): Collection!
	addNodeToWatchlist(nodeId: String!): Boolean!
	removeNodeFromWatchlist(nodeId: String!): Boolean!
	setPreferredAudio(language: String, disposition: TrackDispositionPreference): User!
	deleteLibrary(libraryId: String!): Boolean!
	leaveWatchSession(sessionId: String!, playerId: String!): Boolean!
	watchSessionHeartbeat(input: WatchSessionHeartbeatInput!): WatchSessionBeacon!
	watchSessionAction(input: WatchSessionActionInput!): WatchSessionBeacon!
	mintPlaybackUrl(input: PlaybackUrlInput!): PlaybackUrlPayload!
	mintSubtitleUrl(input: SubtitleUrlInput!): SubtitleUrlPayload!
	disabledSubtitlesHint(input: DisabledSubtitlesHintInput!): Boolean!
}

type Node {
	id: String!
	libraryId: String!
	rootId: String!
	parentId: String
	kind: NodeKind!
	order: Int!
	seasonNumber: Int
	episodeNumber: Int
	lastAddedAt: Int!
	lastFingerprintVersion: Int
	unavailableAt: Int
	createdAt: Int!
	updatedAt: Int!
	root: Node
	parent: Node
	children: [Node!]!
	properties: NodeProperties!
	defaultFile: File
	watchProgress: WatchProgress
	inWatchlist: Boolean!
	nextPlayable: Node
	previousPlayable: Node
	recommendedNodes: [Node!]!
	unplayedCount: Int
	seasonCount: Int!
	episodeCount: Int!
}

enum NodeAvailability {
	AVAILABLE
	UNAVAILABLE
	BOTH
}

type NodeConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [NodeEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Node!]!
}

"""
An edge in a connection.
"""
type NodeEdge {
	"""
	The item at the end of the edge
	"""
	node: Node!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

input NodeFilter {
	libraryId: String
	rootId: String
	parentId: String
	personId: String
	kinds: [NodeKind!]
	searchTerm: String
	availability: NodeAvailability
	orderBy: OrderBy
	orderDirection: OrderDirection
	seasonNumbers: [Int!]
	watched: Boolean
	continueWatching: Boolean
	releasedAfter: Int
}

enum NodeKind {
	MOVIE
	SERIES
	SEASON
	EPISODE
}

type NodeProperties {
	displayName: String!
	description: String
	rating: Float
	seasonNumber: Int
	episodeNumber: Int
	firstAired: Int
	lastAired: Int
	status: MetadataStatus
	tagline: String
	createdAt: Int
	updatedAt: Int
	backdropImage: Asset
	logoImage: Asset
	posterImage: Asset
	thumbnailImage: Asset
	genres: [MetadataGenre!]!
	cast: [CastMember!]!
	contentRating: ContentRating
	displayDetail: String
}

enum OrderBy {
	ADDED_AT
	LAST_ADDED_AT
	FIRST_AIRED
	LAST_AIRED
	RELEASED_AT
	ALPHABETICAL
	RATING
	ORDER
	WATCH_PROGRESS_UPDATED_AT
}

enum OrderDirection {
	ASC
	DESC
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type Person {
	id: String!
	name: String!
	birthday: String
	profileImage: Asset
}

type PlaybackOptions {
	videoRenditions: [VideoRenditionOption!]!
	audioTracks: [AudioTrackOption!]!
	subtitleTracks: [SubtitleTrack!]!
}

input PlaybackUrlInput {
	fileId: String!
	playerId: String!
	videoRenditionId: String!
	audioStreamIndex: Int!
	audioRenditionId: String!
}

type PlaybackUrlPayload {
	url: String!
	packagerId: String!
}

type Query {
	nodeList(filter: NodeFilter!, after: String, first: Int): NodeConnection!
	node(nodeId: String!): Node!
	listFiles(path: String!): [String!]!
	library(libraryId: String!): Library!
	libraries: [Library!]!
	home: HomeView!
	collections(pinned: Boolean): [Collection!]!
	collection(collectionId: String!): Collection
	viewer: User
	watchSession(sessionId: String!): WatchSession
	watchSessions: [WatchSession!]!
	users: [User!]!
	activities: [Activity!]!
}

type SubscriptionRoot {
	contentUpdates: ContentUpdateEvent!
	watchSessionBeacons(sessionId: String!, playerId: String!): WatchSessionBeacon!
}

type SubtitleRendition {
	id: String!
	codecName: String!
	type: SubtitleRenditionType!
	displayInfo: String!
	onDemand: Boolean!
}

enum SubtitleRenditionType {
	DIRECT
	CONVERTED
	OCR
	GENERATED
}

type SubtitleTrack {
	id: String!
	streamIndex: Int!
	displayName: String!
	languageBcp47: String
	flags: [String!]!
	autoselect: Boolean!
	renditions: [SubtitleRendition!]!
}

input SubtitleUrlInput {
	fileId: String!
	trackId: String!
	renditionId: String!
	manual: Boolean
}

type SubtitleUrlPayload {
	url: String!
}

type TimelinePreviewSheet {
	positionMs: Int!
	endMs: Int!
	sheetIntervalMs: Int!
	sheetGapSize: Int!
	asset: Asset!
}

enum TrackDispositionPreference {
	NORMAL
	SDH
	COMMENTARY
}

type User {
	id: String!
	username: String!
	inviteCode: String
	permissions: Int!
	createdAt: Int!
	preferredAudioLanguage: String
	preferredAudioDisposition: String
	lastSeenAt: Int
	libraries: [Library!]!
}

type VideoRenditionOption {
	renditionId: String!
	displayName: String!
	displayInfo: String!
	codecTag: String!
	onDemand: Boolean!
}

type WatchProgress {
	id: String!
	userId: String!
	nodeId: String!
	fileId: String!
	createdAt: Int!
	updatedAt: Int!
	progressPercent: Float!
	completed: Boolean!
}

type WatchSession {
	id: String!
	nodeId: String!
	fileId: String!
	intent: WatchSessionIntent!
	basePositionMs: Int!
	revision: Int!
	createdAt: Int!
	updatedAt: Int!
	players: [WatchSessionPlayer!]!
	baseTimeMs: Float!
	node: Node
	file: File
	mode: WatchSessionMode!
	effectiveState: EffectiveWatchSessionState!
	currentPositionMs: Int!
}

input WatchSessionActionInput {
	sessionId: String!
	playerId: String!
	kind: WatchSessionActionKind!
	positionMs: Int
	nodeId: String
	targetPlayerId: String
}

enum WatchSessionActionKind {
	PLAY
	PAUSE
	SEEK
	SWITCH_ITEM
	REMOVE_PLAYER
}

type WatchSessionBeacon {
	sessionId: String!
	nodeId: String!
	fileId: String!
	mode: WatchSessionMode!
	intent: WatchSessionIntent!
	effectiveState: EffectiveWatchSessionState!
	basePositionMs: Int!
	revision: Int!
	players: [WatchSessionPlayer!]!
	baseTimeMs: Float!
}

input WatchSessionHeartbeatInput {
	sessionId: String!
	playerId: String!
	isBuffering: Boolean!
	basePositionMs: Int!
	baseTimeMs: Float!
	recovery: WatchSessionRecoveryInput!
}

enum WatchSessionIntent {
	PLAYING
	PAUSED
}

enum WatchSessionMode {
	ADVISORY
	SYNCED
}

type WatchSessionPlayer {
	id: String!
	sessionId: String!
	userId: String!
	displayUsername: String!
	basePositionMs: Int!
	joinedAt: Int!
	updatedAt: Int!
	isBuffering: Boolean!
	baseTimeMs: Float!
	lastReportMs: Float!
	user: User
	isInactive: Boolean!
	canRemove: Boolean!
}

input WatchSessionRecoveryInput {
	nodeId: String!
	fileId: String!
	intent: WatchSessionIntent!
	basePositionMs: Int!
	baseTimeMs: Float!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
	subscription: SubscriptionRoot
}
