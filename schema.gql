type Activity {
	taskType: String!
	title: String!
	current: Int!
	total: Int!
	progressPercent: Float!
}

type Asset {
	id: Int!
	source: AssetSource!
	sourceUrl: String
	hashSha256: String
	sizeBytes: Int
	mimeType: String
	height: Int
	width: Int
	thumbhash: String
	createdAt: Int!
	deletedAt: Int
}

enum AssetSource {
	LOCAL
	REMOTE
}

type File {
	id: Int!
	libraryId: Int!
	relativePath: String!
	sizeBytes: Int!
	height: Int
	width: Int
	editionName: String
	unavailableAt: Int
	corruptedAt: Int
	scannedAt: Int
	discoveredAt: Int!
	timelinePreview: [TimelinePreviewSheet!]!
}

enum ItemKind {
	MOVIE
	EPISODE
}

type ItemNode {
	id: String!
	rootId: String!
	seasonId: String
	kind: ItemKind!
	episodeNumber: Int
	order: Int!
	name: String!
	primaryFileId: Int
	lastAddedAt: Int!
	createdAt: Int!
	updatedAt: Int!
	properties: ItemNodeProperties!
	watchProgress: WatchProgress
	file: File
	parent: RootNode
}

type ItemNodeConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [ItemNodeEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [ItemNode!]!
}

"""
An edge in a connection.
"""
type ItemNodeEdge {
	"""
	The item at the end of the edge
	"""
	node: ItemNode!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

input ItemNodeFilter {
	rootId: String!
	seasonNumbers: [Int!]
	orderBy: ItemNodeOrderBy
	orderDirection: OrderDirection
	watched: Boolean
}

enum ItemNodeOrderBy {
	ADDED_AT
	RELEASED_AT
	ALPHABETICAL
	RATING
	SEASON_EPISODE
}

type ItemNodeProperties {
	description: String
	rating: Float
	seasonNumber: Int
	episodeNumber: Int
	runtimeMinutes: Int
	durationSeconds: Int
	width: Int
	height: Int
	videoCodec: String
	audioCodec: String
	fps: Float
	videoBitrate: Int
	audioBitrate: Int
	audioChannels: Int
	hasSubtitles: Boolean
	fileSizeBytes: Int
	releasedAt: Int
	endedAt: Int
	createdAt: Int
	updatedAt: Int
	backgroundImage: Asset
	posterImage: Asset
	thumbnailImage: Asset
}

type Library {
	id: Int!
	name: String!
	path: String!
	lastScannedAt: Int
	createdAt: Int!
}

type Mutation {
	signup(username: String!, password: String!, permissions: Int, inviteCode: String): User!
	updateWatchProgress(fileId: Int!, progressPercent: Float!, userId: String): [WatchProgress!]!
	createLibrary(name: String!, path: String!): Library!
}

enum OrderDirection {
	ASC
	DESC
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type Query {
	rootList(filter: RootNodeFilter!, after: String, first: Int): RootNodeConnection!
	itemList(filter: ItemNodeFilter!, after: String, first: Int): ItemNodeConnection!
	root(rootId: String!): RootNode!
	season(seasonId: String!): SeasonNode!
	item(itemId: String!): ItemNode!
	"""
	Used during library setup to pick the library path
	"""
	listFiles(path: String!): [String!]!
	libraries: [Library!]!
	activities: [Activity!]!
}

union RootChild = SeasonNode | ItemNode

enum RootKind {
	MOVIE
	SERIES
}

type RootNode {
	id: String!
	libraryId: Int!
	kind: RootKind!
	name: String!
	lastAddedAt: Int!
	createdAt: Int!
	updatedAt: Int!
	properties: RootNodeProperties!
	seasons: [SeasonNode!]!
	files: [ItemNode!]!
	children: [RootChild!]!
	playableItem: ItemNode
	watchProgress: WatchProgress
	unplayedItems: Int!
	seasonCount: Int!
	episodeCount: Int!
}

type RootNodeConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [RootNodeEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [RootNode!]!
}

"""
An edge in a connection.
"""
type RootNodeEdge {
	"""
	The item at the end of the edge
	"""
	node: RootNode!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

input RootNodeFilter {
	libraryId: Int
	kinds: [RootKind!]
	orderBy: RootNodeOrderBy
	orderDirection: OrderDirection
	watched: Boolean
}

enum RootNodeOrderBy {
	ADDED_AT
	RELEASED_AT
	ALPHABETICAL
	RATING
	SEASON_EPISODE
}

type RootNodeProperties {
	description: String
	rating: Float
	runtimeMinutes: Int
	releasedAt: Int
	endedAt: Int
	createdAt: Int
	updatedAt: Int
	backgroundImage: Asset
	posterImage: Asset
	thumbnailImage: Asset
}

type SeasonNode {
	id: String!
	rootId: String!
	seasonNumber: Int!
	order: Int!
	name: String!
	lastAddedAt: Int!
	createdAt: Int!
	updatedAt: Int!
	properties: SeasonNodeProperties!
	files: [ItemNode!]!
	playableItem: ItemNode
	watchProgress: WatchProgress
	unplayedItems: Int!
	episodeCount: Int!
}

type SeasonNodeProperties {
	description: String
	rating: Float
	seasonNumber: Int
	runtimeMinutes: Int
	releasedAt: Int
	endedAt: Int
	createdAt: Int
	updatedAt: Int
	backgroundImage: Asset
	posterImage: Asset
	thumbnailImage: Asset
}

type TimelinePreviewSheet {
	positionMs: Int!
	endMs: Int!
	sheetIntervalMs: Int!
	sheetGapSize: Int!
	asset: Asset!
}

type User {
	id: String!
	username: String!
	permissions: Int!
	defaultSubtitleIso6391: String
	defaultAudioIso6391: String
	subtitlesEnabled: Boolean!
	createdAt: Int!
}

type WatchProgress {
	id: Int!
	userId: String!
	itemId: String!
	fileId: Int!
	progressPercent: Float!
	createdAt: Int!
	updatedAt: Int!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
}
