type Media {
	id: Int!
	imdbId: String
	tmdbId: Int
	parentId: Int
	kind: MediaKind!
	name: String!
	description: String
	rating: Float
	posterUrl: String
	backgroundUrl: String
	thumbnailUrl: String
	seasonNumber: Int
	episodeNumber: Int
	runtimeMinutes: Int
	releasedAt: Int
	endedAt: Int
	createdAt: Int!
	updatedAt: Int
	firstLinkedAt: Int
}

type MediaConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [MediaEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Media!]!
}

"""
An edge in a connection.
"""
type MediaEdge {
	"""
	The item at the end of the edge
	"""
	node: Media!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

input MediaFilter {
	parentId: Int
	seasonNumbers: [Int!]
	kinds: [MediaKind!]
	search: String
	orderBy: MediaOrderBy
	orderDirection: OrderDirection
	watched: Boolean
}

enum MediaKind {
	MOVIE
	SHOW
	EPISODE
}

enum MediaOrderBy {
	ADDED_AT
	RELEASED_AT
	ALPHABETICAL
	RATING
	SEASON_EPISODE
}

type Mutation {
	signup(username: String!, password: String!, permissions: Int, inviteCode: String): User!
	updateWatchState(mediaId: Int!, progressPercentage: Float!, userId: String): WatchState!
}

enum OrderDirection {
	ASC
	DESC
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type Query {
	mediaList(filter: MediaFilter!, after: String, first: Int): MediaConnection!
	media(mediaId: Int!): Media!
}

type User {
	id: String!
	username: String!
	passwordHash: String
	inviteCode: String
	permissions: Int!
	defaultSubtitleBcp47: String
	defaultAudioBcp47: String
	subtitlesEnabled: Boolean!
	createdAt: Int!
}

type WatchState {
	id: Int!
	userId: String!
	mediaId: Int!
	progressPercentage: Float!
	createdAt: Int!
	updatedAt: Int!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
}
