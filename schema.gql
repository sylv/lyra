type Activity {
	taskType: String!
	title: String!
	current: Int!
	total: Int!
	progressPercent: Float!
}

type Asset {
	id: String!
	sourceUrl: String
	hashSha256: String
	sizeBytes: Int
	mimeType: String
	height: Int
	width: Int
	thumbhash: String
	createdAt: Int!
	signedUrl: String!
}

enum ContentUpdateEvent {
	CONTENT_UPDATE
}

type File {
	id: String!
	libraryId: String!
	relativePath: String!
	sizeBytes: Int!
	height: Int
	width: Int
	editionName: String
	unavailableAt: Int
	scannedAt: Int
	discoveredAt: Int!
	timelinePreview: [TimelinePreviewSheet!]!
	segments: [FileSegment!]!
}

type FileSegment {
	kind: FileSegmentKind!
	startMs: Int!
	endMs: Int!
}

enum FileSegmentKind {
	INTRO
}

type ImportWatchStateConflict {
	rowIndex: Int!
	sourceItemId: String
	title: String
	itemId: String!
	existingProgressPercent: Float!
	importedProgressPercent: Float!
	reason: String!
}

input ImportWatchStateRowInput {
	source: String!
	sourceItemId: String
	title: String
	mediaType: String
	seasonNumber: Int
	episodeNumber: Int
	progressPercent: Float!
	viewedAt: Int
	filePath: String
	fileBasename: String
	fileSizeBytes: Int
	imdbId: String
	tmdbId: Int
}

type ImportWatchStateUnmatched {
	rowIndex: Int!
	sourceItemId: String
	title: String
	reason: String!
	ambiguous: Boolean!
}

input ImportWatchStatesInput {
	dryRun: Boolean!
	overwriteConflicts: Boolean!
	rows: [ImportWatchStateRowInput!]!
}

type ImportWatchStatesResult {
	dryRun: Boolean!
	totalRows: Int!
	matchedRows: Int!
	unmatchedRows: Int!
	conflictRows: Int!
	willInsert: Int!
	willOverwrite: Int!
	imported: Int!
	skipped: Int!
	conflicts: [ImportWatchStateConflict!]!
	unmatched: [ImportWatchStateUnmatched!]!
}

type Library {
	id: String!
	name: String!
	path: String!
	lastScannedAt: Int
	createdAt: Int!
}

type Mutation {
	signup(username: String!, password: String!, permissions: Int, inviteCode: String): User!
	createUserInvite(username: String!, permissions: Int!): User!
	updateUser(userId: String!, username: String!, permissions: Int!): User!
	resetUserInvite(userId: String!): User!
	deleteUser(userId: String!): Boolean!
	updateWatchProgress(fileId: String!, progressPercent: Float!, userId: String): [WatchProgress!]!
	importWatchStates(input: ImportWatchStatesInput!): ImportWatchStatesResult!
	createLibrary(name: String!, path: String!): Library!
	updateLibrary(libraryId: String!, name: String!, path: String!): Library!
	deleteLibrary(libraryId: String!): Boolean!
}

type Node {
	id: String!
	libraryId: String!
	rootId: String!
	parentId: String
	kind: NodeKind!
	name: String!
	order: Int!
	seasonNumber: Int
	episodeNumber: Int
	lastAddedAt: Int!
	createdAt: Int!
	updatedAt: Int!
	root: Node
	parent: Node
	children: [Node!]!
	properties: NodeProperties!
	file: File
	watchProgress: WatchProgress
	nextPlayable: Node
	previousPlayable: Node
	unplayedCount: Int!
	seasonCount: Int!
	episodeCount: Int!
}

type NodeConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [NodeEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Node!]!
}

"""
An edge in a connection.
"""
type NodeEdge {
	"""
	The item at the end of the edge
	"""
	node: Node!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

input NodeFilter {
	libraryId: String
	rootId: String
	parentId: String
	kinds: [NodeKind!]
	orderBy: OrderBy
	orderDirection: OrderDirection
	watched: Boolean
}

enum NodeKind {
	MOVIE
	SERIES
	SEASON
	EPISODE
}

type NodeProperties {
	description: String
	rating: Float
	seasonNumber: Int
	episodeNumber: Int
	runtimeMinutes: Int
	durationSeconds: Int
	width: Int
	height: Int
	videoCodec: String
	audioCodec: String
	fps: Float
	videoBitrate: Int
	audioBitrate: Int
	audioChannels: Int
	hasSubtitles: Boolean
	fileSizeBytes: Int
	releasedAt: Int
	endedAt: Int
	createdAt: Int
	updatedAt: Int
	backgroundImage: Asset
	posterImage: Asset
	thumbnailImage: Asset
}

enum OrderBy {
	ADDED_AT
	RELEASED_AT
	ALPHABETICAL
	RATING
	ORDER
}

enum OrderDirection {
	ASC
	DESC
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type Query {
	nodeList(filter: NodeFilter!, after: String, first: Int): NodeConnection!
	node(nodeId: String!): Node!
	search(query: String!, limit: Int): SearchResults!
	listFiles(path: String!): [String!]!
	library(libraryId: String!): Library!
	libraries: [Library!]!
	viewer: User
	users: [User!]!
	activities: [Activity!]!
}

type SearchResults {
	roots: [Node!]!
	episodes: [Node!]!
}

type SubscriptionRoot {
	contentUpdates: ContentUpdateEvent!
}

type TimelinePreviewSheet {
	positionMs: Int!
	endMs: Int!
	sheetIntervalMs: Int!
	sheetGapSize: Int!
	asset: Asset!
}

type User {
	id: String!
	username: String!
	inviteCode: String
	permissions: Int!
	lastSeenAt: Int
	createdAt: Int!
}

type WatchProgress {
	id: String!
	userId: String!
	nodeId: String!
	fileId: String!
	createdAt: Int!
	updatedAt: Int!
	progressPercent: Float!
	completed: Boolean!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
	subscription: SubscriptionRoot
}
